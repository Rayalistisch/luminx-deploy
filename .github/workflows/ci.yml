name: CI

on:
  push:
    branches: [main]
  pull_request:

# A second push to the same branch makes the first run's answer worthless.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Both lines package.json's `engines` promises. A promise nobody tests is a guess.
      matrix:
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # --frozen-lockfile: CI verifies the committed lockfile, it does not update it.
      - run: pnpm install --frozen-lockfile

      # The same target the developer runs. Boundaries, purity, format, typecheck,
      # build, cycles, tests — in that order, first failure stops the run.
      - run: pnpm run ci

  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # composer.json's `php` constraint. Craft 5 supports both, and 8.5 is not one of them:
      # it emits deprecation notices from inside Craft itself.
      matrix:
        php: ['8.3', '8.4']

    defaults:
      run:
        working-directory: packages/craft-plugin

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, dom, pdo
          coverage: none

      # No --frozen-lockfile: craft-luminx is a library and commits no lock file, so CI must
      # resolve fresh. That is also the point — it catches a dependency that broke us.
      - run: composer install --no-interaction --no-progress

      # Nothing here boots Craft. The gateway seam is what makes that possible.
      - run: ./vendor/bin/pest
